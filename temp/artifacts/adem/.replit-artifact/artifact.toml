kind = "web"
previewPath = "/"
title = "ADEM"
version = "1.0.0"
id = "artifacts/adem"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24242

[services.development]
run = "pnpm --filter @workspace/adem run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/adem", "run", "build" ]
publicDir = "artifacts/adem/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24242"
BASE_PATH = "/"
